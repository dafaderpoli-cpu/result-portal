<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behala College Result Portal - University of Calcutta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        h1 {
            color: #1e3c72;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #1e3c72;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #1e3c72;
            background: white;
            box-shadow: 0 0 0 3px rgba(30,60,114,0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30,60,114,0.3);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0ff 100%);
            border-radius: 15px;
            border-left: 5px solid #1e3c72;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h3 {
            color: #1e3c72;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e1e5e9;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #1e3c72;
        }

        .result-value {
            color: #2a5298;
            font-weight: 500;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: 600;
        }

        .pass {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .fail {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">CU</div>
            <h1>Behala College</h1>
            <p class="subtitle">University of Calcutta Result Portal</p>
            <p style="color: #1e3c72; font-weight: 600; margin-top: 10px;">April 2025 Examination</p>
        </div>

        <form id="resultForm">
            <div class="form-group">
                <label for="semester">Semester *</label>
                <select id="semester" required>
                    <option value="">Select Semester</option>
                    <option value="1">1st Semester</option>
                    <option value="2">2nd Semester</option>
                    <option value="3">3rd Semester</option>
                    <option value="4">4th Semester</option>
                    <option value="5">5th Semester</option>
                    <option value="6">6th Semester</option>
                </select>
            </div>

            <div class="form-group">
                <label for="registration">Registration ID *</label>
                <input type="text" id="registration" placeholder="Enter Registration ID" required>
            </div>

            <div class="form-group">
                <label for="year">Year *</label>
                <input type="text" id="year" value="2025" readonly>
            </div>

            <div class="form-group">
                <label for="rollno">Roll No. *</label>
                <input type="text" id="rollno" placeholder="Enter Roll Number" required>
            </div>

            <button type="submit" class="btn">Check Result</button>
        </form>

        <div id="resultContainer" class="result">
            <h3>🎓 Examination Result</h3>
            <div class="result-item">
                <span class="result-label">Semester:</span>
                <span class="result-value" id="resultSemester">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Registration ID:</span>
                <span class="result-value" id="resultReg">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Roll No:</span>
                <span class="result-value" id="resultRoll">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Year:</span>
                <span class="result-value" id="resultYear">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Total Marks:</span>
                <span class="result-value" id="totalMarks">600</span>
            </div>
            <div class="result-item">
                <span class="result-label">Obtained Marks:</span>
                <span class="result-value" id="obtainedMarks">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">Percentage:</span>
                <span class="result-value" id="percentage">-</span>
            </div>
            <div id="status" class="status"></div>
        </div>
    </div>

    <script>
        document.getElementById('resultForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const semester = document.getElementById('semester').value;
            const registration = document.getElementById('registration').value;
            const rollno = document.getElementById('rollno').value;
            
            // Simulate result data (in real implementation, this would come from server)
            const rollNum = parseInt(rollno);
            const obtainedMarks = (rollNum % 500) + 100; // Random marks between 100-600
            const percentage = ((obtainedMarks / 600) * 100).toFixed(2);
            const isPass = obtainedMarks >= 300;
            
            // Update result fields
            document.getElementById('resultSemester').textContent = semester + ' Semester';
            document.getElementById('resultReg').textContent = registration;
            document.getElementById('resultRoll').textContent = rollno;
            document.getElementById('resultYear').textContent = '2025';
            document.getElementById('obtainedMarks').textContent = obtainedMarks;
            document.getElementById('percentage').textContent = percentage + '%';
            
            // Update status
            const statusEl = document.getElementById('status');
            if (isPass) {
                statusEl.textContent = '🎉 PASS - Congratulations!';
                statusEl.className = 'status pass';
            } else {
                statusEl.textContent = '❌ FAIL - Better luck next time!';
                statusEl.className = 'status fail';
            }
            
            // Show result
            document.getElementById('resultContainer').classList.add('show');
            
            // Scroll to result
            document.getElementById('resultContainer').scrollIntoView({ 
                behavior: 'smooth' 
            });
        });
    </script>
</body>
</html>
